<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layoutBase(~{:: #loginContent})}">

<head>
	<link rel="stylesheet" th:href="@{/estilos/login.css}">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
	<style>
		/* 🌟 Ajuste sutil para que el login quede perfectamente centrado dentro del layout sin chocar */
		.login-wrapper {
			min-height: 75vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}
	</style>
</head>

<body>

	<div id="loginContent" class="animate__animated animate__fadeIn login-wrapper row justify-content-center w-100 m-0">

		<div class="col-11 col-md-9 col-lg-7 p-0">

			<div class="card shadow-lg rounded-4 overflow-hidden login-box text-dark border-0">
				<div class="row g-0">

					<div class="col-md-6 d-none d-md-block bg-video">
						<video id="videoLogin" autoplay muted playsinline class="w-100 h-100"
							style="object-fit: cover;">
							<source th:src="@{/img/loginv.mp4}" type="video/mp4">
							Tu navegador no soporta el video.
						</video>
					</div>

					<div class="col-md-6 p-4 d-flex align-items-center bg-white">
						<div class="card-body w-100">

							<h3 class="text-center text-primary fw-bold mb-4">
								<i class="fas fa-user-circle me-2"></i> Iniciar Sesión
							</h3>

							<form th:action="@{/login/iniciar-sesion}" th:object="${authDto}" method="post"
								class="needs-validation" novalidate>

								<div class="mb-3">
									<label for="correo" class="form-label fw-semibold">Correo Electrónico</label>
									<input type="email" th:field="*{correo}" class="form-control" id="correo"
										placeholder="ejemplo@correo.com" required autocomplete="username">
									<div class="invalid-feedback">
										Por favor, ingresa un correo electrónico válido.
									</div>
								</div>

								<div class="mb-4">
									<label for="password" class="form-label fw-semibold">Contraseña</label>
									<input type="password" th:field="*{password}" class="form-control" id="password"
										placeholder="Tu contraseña" required autocomplete="current-password">
									<div class="invalid-feedback">
										La contraseña es obligatoria para ingresar.
									</div>
								</div>

								<button type="submit" class="btn btn-primary w-100 fw-bold">
									<i class="fas fa-sign-in-alt me-1"></i> Iniciar sesión
								</button>

								<div class="mt-3 text-center">
									<p class="mb-0 text-dark">¿No tienes una cuenta? <a
											th:href="@{/registro}">Regístrate aquí</a></p>
								</div>
							</form>

						</div>
					</div>

				</div>
			</div>
		</div>
		<script>
			// Tu script del video e inspección de validación se mantiene igual aquí abajo...
		</script>
	</div>

	<script>
		(() => {
			'use strict'
			const forms = document.querySelectorAll('.needs-validation')

			Array.from(forms).forEach(form => {
				form.addEventListener('submit', event => {
					if (!form.checkValidity()) {
						event.preventDefault()
						event.stopPropagation()
					}
					form.classList.add('was-validated')
				}, false)
			})
		})()

		const video = document.getElementById("videoLogin");
		if (video) {
			video.addEventListener("ended", () => {
				video.currentTime = 0;
				video.play();
			});
		}
	</script>
	</div>

</body>

</html>
