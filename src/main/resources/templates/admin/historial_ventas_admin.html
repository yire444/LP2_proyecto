<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layoutBase(~{:: #ventasAdminContent})}">
<head>
    <meta charset="UTF-8">
</head>
<body>
	<div id="ventasAdminContent" class="animate__animated animate__fadeIn pb-5">

		<section class="text-center my-4">
			<h2 class="fw-bold text-warning mb-2"><i class="fa-solid fa-receipt me-2"></i>Historial de Ventas Globales</h2>
			<p class="text-white-50 lead">Monitorea los ingresos y las transacciones de órdenes procesadas en la plataforma.</p>
		</section>

		<div class="card bg-secondary border-0 p-4 rounded-4 shadow-sm text-white"
			style="background: rgba(33, 37, 41, 0.85) !important; backdrop-filter: blur(10px);">
			<div class="table-responsive">
				<table id="tablaVentasAdmin" class="table table-dark table-hover align-middle m-0 border-secondary">
					<thead>
						<tr class="text-warning border-secondary small text-uppercase">
							<th style="width: 10%;">N° Pedido</th>
							<th>Cliente</th>
							<th>Fecha de Compra</th>
							<th class="text-center">Total Recaudado</th>
							<th class="text-center">Estado</th>
							<th class="text-center" style="width: 12%;">Acciones</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="p : ${pedidosGlobales}" class="border-secondary">
							<td class="fw-bold text-white-50" th:text="'#' + ${p.idPedido}">#001</td>
							<td class="fw-bold text-white" th:text="${p.usuario.nombre + ' ' + p.usuario.apellido}">Cliente</td>
							<td th:text="${p.fechaCompra}">01/01/2026</td>
							<td class="text-center fw-bold text-success" th:text="'S/ ' + ${p.total}">S/ 0.00</td>
							<td class="text-center">
								<span th:text="${p.estado}"
									th:classappend="${p.estado == 'PAGADO' || p.estado == 'Entregado'} ? 'bg-success' : 'bg-danger'"
									class="badge rounded-pill px-3 py-1">Estado</span>
							</td>
							<td class="text-center">
								<button type="button" class="btn btn-sm btn-outline-info rounded-3 px-3 btn-ver-detalle" 
										th:data-id="${p.idPedido}">
									<i class="fa-solid fa-eye me-1"></i>Detalle
								</button>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div class="modal fade" id="modalDetalleVenta" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered text-white">
				<div class="modal-content bg-dark border-secondary shadow-lg rounded-4">
					<div class="modal-header border-secondary">
						<h5 class="modal-title fw-bold text-info" id="modalTituloPedido">Detalle del Pedido #0</h5>
						<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body p-4">
						<div class="table-responsive">
							<table class="table table-dark table-sm align-middle m-0 text-white-50">
								<thead>
									<tr class="text-info small text-uppercase">
										<th>Libro Adquirido</th>
										<th class="text-center">Cant.</th>
										<th class="text-end">Subtotal</th>
									</tr>
								</thead>
								<tbody id="tbodyDetalleVenta">
									</tbody>
							</table>
						</div>
					</div>
					<div class="modal-footer border-secondary justify-content-center">
						<button type="button" class="btn btn-outline-secondary btn-sm px-4 rounded-3" data-bs-dismiss="modal">Cerrar Historial</button>
					</div>
				</div>
			</div>
		</div>

		<script th:inline="none">
			$(document).ready(function () {
				// 1. Inicialización de DataTables
				$('#tablaVentasAdmin').DataTable({
					language: {
						url: 'https://cdn.datatables.net/plug-ins/2.3.2/i18n/es-ES.json'
					},
					searching: true, // El admin puede buscar ventas por nombre de cliente o número
					lengthChange: false,
					pageLength: 10,  // Paginación de 10 en 10
					ordering: false  // Desactiva las flechas de ordenación
				});

				// 2. Escucha AJAX para pintar el Modal de detalles usando tu /pedido/detalle-json
				$('.btn-ver-detalle').on('click', function() {
					var idPedido = $(this).data('id');
					$('#modalTituloPedido').text('Detalle del Pedido #' + idPedido);
					var $tbody = $('#tbodyDetalleVenta');
					$tbody.html('<tr><td colspan="3" class="text-center py-3 text-white-50"><i class="fa-solid fa-spinner fa-spin me-2"></i>Cargando ítems...</td></tr>');
					
					var modal = new bootstrap.Modal(document.getElementById('modalDetalleVenta'));
					modal.show();

					$.ajax({
						url: '/pedido/detalle-json',
						type: 'GET',
						data: { idPedido: idPedido },
						success: function(data) {
							$tbody.empty();
							if(data.length === 0) {
								$tbody.html('<tr><td colspan="3" class="text-center py-2 text-warning">No hay detalles registrados.</td></tr>');
								return;
							}
							data.forEach(function(item) {
								var subtotal = item.precio * item.cantidad;
								var fila = '<tr class="border-secondary">' +
									'<td class="text-white fw-bold">' + item.titulo + '<br><small class="text-muted">' + item.autor + '</small></td>' +
									'<td class="text-center font-monospace">' + item.cantidad + '</td>' +
									'<td class="text-end fw-bold text-success">S/ ' + subtotal.toFixed(2) + '</td>' +
								'</tr>';
								$tbody.append(fila);
							});
						},
						error: function() {
							$tbody.html('<tr><td colspan="3" class="text-center py-2 text-danger">Error al recuperar los datos del servidor.</td></tr>');
						}
					});
				});
			});
		</script>

	</div>
</body>
</html>
