<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layoutBase(~{:: #librosAdminContent})}">
<head>
    <meta charset="UTF-8">
</head>
<body>
	<div id="librosAdminContent" class="animate__animated animate__fadeIn pb-5">

		<section class="d-flex justify-content-between align-items-center my-4">
			<div>
				<h2 class="fw-bold text-warning mb-1"><i class="fa-solid fa-boxes-stacked me-2"></i>Gestión de Libros</h2>
				<p class="text-white-50 m-0">Administra, edita y expande el catálogo de obras disponibles en la plataforma.</p>
			</div>
			<a th:href="@{/libro/nuevo}" class="btn btn-primary rounded-3 fw-bold shadow-sm">
				<i class="fa-solid fa-plus me-2"></i>Registrar Obra
			</a>
		</section>

		<div class="card bg-secondary border-0 p-4 rounded-4 shadow-sm text-white"
			style="background: rgba(33, 37, 41, 0.85) !important; backdrop-filter: blur(10px);">
			<div class="table-responsive">
				<table id="tablaLibrosAdmin" class="table table-dark table-hover align-middle m-0 border-secondary">
					<thead>
						<tr class="text-warning border-secondary small text-uppercase">
							<th style="width: 8%;">ID</th>
							<th>Título de la Obra</th>
							<th>Autor</th>
							<th>Categoría</th>
							<th class="text-center">Precio</th>
							<th class="text-center">Stock</th>
							<th class="text-center">Estado</th>
							<th class="text-center" style="width: 22%;">Acciones</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="l : ${lstLibrosAdmin}" class="border-secondary">
							<td class="fw-bold text-white-50" th:text="'#' + ${l.idLibro}">#1</td>
							<td class="fw-bold text-white" th:text="${l.titulo}">Título</td>
							<td th:text="${l.autor}">Autor</td>
							<td>
								<span class="badge bg-dark border border-secondary text-info px-2 py-1" 
									th:text="${l.categoria.nombre}">Categoría</span>
							</td>
							<td class="text-center fw-bold text-success" th:text="'S/ ' + ${l.precio}">S/ 0.00</td>
							<td class="text-center fw-bold" 
								th:classappend="${l.stock > 5} ? 'text-white' : 'text-danger'" 
								th:text="${l.stock}">0</td>
							
							<td class="text-center">
								<span th:text="${l.activo == true} ? 'Activo' : 'Inactivo'"
									th:classappend="${l.activo == true} ? 'bg-success' : 'bg-danger'"
									class="badge rounded-pill px-3 py-1">Estado</span>
							</td>

							<td class="text-center">
								<a th:href="@{/libro/editar(idLibro=${l.idLibro})}" 
								   class="btn btn-sm btn-outline-warning rounded-3 px-3 shadow-sm">
									<i class="fa-solid fa-pen-to-square me-1"></i> Editar
								</a>
								
								<button type="button" class="btn btn-sm rounded-3 px-3 ms-1 shadow-sm btn-eliminar-libro"
										th:data-id="${l.idLibro}"
										th:data-titulo="${l.titulo}"
										th:data-activo="${l.activo == true}"
										th:classappend="${l.activo == true} ? 'btn-outline-danger' : 'btn-outline-success'">
									<i class="fa-solid" th:classappend="${l.activo == true} ? 'fa-trash-can me-1' : 'fa-trash-arrow-up me-1'"></i>
									<span th:text="${l.activo == true} ? 'Eliminar' : 'Activar'">Acción</span>
								</button>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div class="modal fade" id="modalEliminarLibro" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content bg-dark text-white border-secondary rounded-4 shadow-lg">
					<div class="modal-header border-0 justify-content-center pt-4">
						<div class="text-center">
							<i id="modalIconoLibro" class="fa-solid fa-trash-arrow-up fa-3x mb-2"></i>
							<h5 class="modal-title fw-bold" id="eliminarLibroTitulo">¿Retirar Libro del Catálogo?</h5>
						</div>
					</div>
					<div class="modal-body text-center text-white-50 px-4 pb-4">
						<p id="eliminarLibroMensaje" class="m-0">¿Estás seguro de realizar esta acción?</p>
					</div>
					<div class="modal-footer border-0 justify-content-center pb-4">
						<form th:action="@{/libro/eliminar}" method="POST" id="formEliminarLibro">
							<input type="hidden" name="idLibro" id="inputModalIdLibro" />
							<button type="button" class="btn btn-outline-secondary px-4 rounded-3 me-2" data-bs-dismiss="modal">Cancelar</button>
							<button type="submit" id="btnModalConfirmarLibro" class="btn px-4 rounded-3 fw-bold text-white">Confirmar</button>
						</form>
					</div>
				</div>
			</div>
		</div>

		<script th:inline="none">
			$(document).ready(function () {
				// Initialize DataTable
				$('#tablaLibrosAdmin').DataTable({
					language: {
						url: 'https://cdn.datatables.net/plug-ins/2.3.2/i18n/es-ES.json'
					},
					searching: true, 
					lengthChange: false,
					pageLength: 10,   
					ordering: false   
				});

				// Interceptor dinámico para armar el modal según el estado
				$('.btn-eliminar-libro').on('click', function() {
					var idLibro = $(this).data('id');
					var titulo = $(this).data('titulo');
					var estaActivo = $(this).data('activo'); // Captura true o false

					$('#inputModalIdLibro').val(idLibro);

					if (estaActivo) {
						$('#modalIconoLibro').attr('class', 'fa-solid fa-trash-can fa-3x text-danger mb-2');
						$('#eliminarLibroTitulo').text('Desactivar Obra #' + idLibro);
						$('#eliminarLibroMensaje').html('¿Estás seguro de que deseas dar de baja la obra <strong>' + titulo + '</strong>?<br><span class="text-danger small">Se ocultará inmediatamente de la vitrina pública de los clientes.</span>');
						$('#btnModalConfirmarLibro').attr('class', 'btn btn-danger px-4 rounded-3 fw-bold text-white').text('Eliminar de la Tienda');
					} else {
						$('#modalIconoLibro').attr('class', 'fa-solid fa-trash-arrow-up fa-3x text-success mb-2');
						$('#eliminarLibroTitulo').text('Activar Obra #' + idLibro);
						$('#eliminarLibroMensaje').html('¿Deseas restaurar la obra <strong>' + titulo + '</strong>?<br>Volverá a estar visible y disponible para compra en el catálogo público.');
						$('#btnModalConfirmarLibro').attr('class', 'btn btn-success px-4 rounded-3 fw-bold text-white').text('Activar en la Tienda');
					}

					var modalEliminar = new bootstrap.Modal(document.getElementById('modalEliminarLibro'));
					modalEliminar.show();
				});
			});
		</script>

	</div>
</body>
</html>
